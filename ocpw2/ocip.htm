<div id="ipinfo-panel" style="
    padding:16px;
    margin:15px;
    border-radius:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#fff;

    background:linear-gradient(135deg,
        rgba(255,0,150,0.25),
        rgba(0,0,0,0.75)
    );

    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(255,0,150,0.3);
">

<!-- LEFT -->
<div style="flex:1">

    <div style="margin-bottom:10px;">
        <b>IP:</b>
        <span id="ip">-</span>

        <button type="button" onclick="toggleIP()" style="
            margin-left:10px;
            padding:3px 10px;
            border:none;
            border-radius:6px;
            background:#ff4da6;
            color:#fff;
            cursor:pointer;
        ">Hide</button>
    </div>

    <div><b>Location:</b> <span id="loc">-</span></div>
    <div><b>ISP:</b> <span id="isp">-</span></div>

    <div><b>Ping:</b> <span id="ping">-</span></div>
    <div><b>Status:</b> <span id="status">-</span></div>

</div>

<!-- RIGHT -->
<div style="text-align:center; min-width:140px;">
    <img id="flag" style="
        width:120px;
        border-radius:12px;
        box-shadow:0 0 15px rgba(255,255,255,0.4);
    ">

    <div id="cc" style="
        margin-top:8px;
        font-weight:bold;
        letter-spacing:2px;
    ">--</div>
</div>

</div>

<script>
let ipVisible = true;

function toggleIP() {
    let ip = document.getElementById("ip");
    if (!ip) return;

    if (ipVisible) {
        ip.innerText = "●●●●●●●●●";
    } else {
        ip.innerText = ip.dataset.real || "-";
    }

    ipVisible = !ipVisible;
}

if (!window.__IPINFO_LOADED__) {
    window.__IPINFO_LOADED__ = true;

    async function loadIP_OC() {
        try {
            let panel = document.getElementById("ipinfo-panel");

            // PARALLEL FETCH (FAST + CLEAN)
            let ipPromise = fetch('/cgi-bin/luci/openclash/get_ip', {
                cache: "no-store"
            }).then(r => r.json());

            let pingPromise = fetch('/cgi-bin/luci/openclash/ping_test', {
                cache: "no-store"
            }).then(r => r.json());

            let [data, pingData] = await Promise.all([ipPromise, pingPromise]);

            let cc = data.network?.autonomous_system?.country || "xx";
            let ipEl = document.getElementById("ip");

            // SAVE REAL IP ONCE
            ipEl.dataset.real = data.ip || "-";

            // APPLY IP (RESPECT HIDE STATE)
            if (ipVisible) {
                ipEl.innerText = ipEl.dataset.real;
            } else {
                ipEl.innerText = "●●●●●●●●●";
            }

            document.getElementById("loc").innerText =
                (data.location?.city || "-") + ", " + (data.location?.country || "-");

            document.getElementById("isp").innerText =
                data.network?.autonomous_system?.organization || "-";

            document.getElementById("cc").innerText = cc;

            document.getElementById("flag").src =
                "https://flagcdn.com/w160/" + cc.toLowerCase() + ".png";

            // STATUS
            document.getElementById("status").innerText =
                (cc !== "MY") ? "PROXY" : "DIRECT";

            // PING
            let ping = pingData.ping || 0;
            let pingEl = document.getElementById("ping");

            pingEl.innerText = ping + " ms";

            if (ping < 70) pingEl.style.color = "#00ff6a";
            else if (ping <= 120) pingEl.style.color = "#ffd000";
            else pingEl.style.color = "#ff3b3b";

            // BACKGROUND MODE
            if (ping > 0 && ping < 150) {
                panel.style.background =
                    "linear-gradient(135deg, rgba(255,0,150,0.3), rgba(0,0,0,0.75))";
            } else {
                panel.style.background =
                    "linear-gradient(135deg, rgba(255,0,0,0.3), rgba(0,0,0,0.75))";
            }

        } catch (e) {
            console.log(e);
            document.getElementById("ipinfo-panel").innerHTML =
                "<b style='color:red'>API FAIL / NO INTERNET</b>";
        }
    }

    setInterval(loadIP_OC, 5000);
    loadIP_OC();
}
</script>
